server:
  port: 8080

spring:
  application:
    name: agentic-rag
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  redis:
    host: localhost
    port: 6379
  elasticsearch:
    uris: http://localhost:9200

rocketmq:
  name-server: localhost:9876
  producer:
    group: rag-producer-group

rag:
  mock-enabled: false
  upload:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: rag-bucket
  mq:
    topic: rag-upload-complete
    consumer-group: rag-consumer-group
  es:
    index: rag_chunks
    vector-dims: 8
  search:
    rrf-k: 60
  embedding:
    provider: alibaba
    api-key: ${DASHSCOPE_API_KEY:}
    endpoint: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
    model: qwen3-vl-embedding
  rerank:
    provider: qwen
    endpoint: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen3-vl-rerank
  rewrite:
    provider: qwen
    endpoint: ""
    api-key: ""
    model: qwen3.5-flash
    variants: 3
  memory:
    index: rag_memory
    history-top-k: 3
    summarize-every-turns: 20
    summary-endpoint: ""
    summary-model: qwen-max
    api-key: ""
  agent:
    enabled: true
    max-steps: 5
    doc-top-k: 3
    memory-top-k: 3
    planner-endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
    planner-model: qwen3.5-flash
    api-key: ${DASHSCOPE_API_KEY:}
