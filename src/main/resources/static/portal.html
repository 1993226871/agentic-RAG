<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RAG 工作台</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --card: #ffffff;
            --line: #e5e8ef;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --ok: #16a34a;
            --err: #dc2626;
            --warn: #d97706;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #ffffff, var(--bg));
            color: var(--text);
        }
        .container {
            max-width: 1060px;
            margin: 0 auto;
            padding: 28px 16px 36px;
        }
        .header {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
        }
        .title {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.2px;
        }
        .sub {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }
        .top-row {
            margin-top: 14px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .base-url {
            flex: 1 1 320px;
        }
        .grid {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .tabbar {
            margin-top: 16px;
            display: inline-flex;
            gap: 6px;
            padding: 6px;
            background: #f3f5fa;
            border: 1px solid var(--line);
            border-radius: 12px;
        }
        .tab-btn {
            width: auto;
            border: none;
            background: transparent;
            color: #4b5563;
            padding: 9px 18px;
            border-radius: 9px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #ffffff;
            color: var(--primary);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
        }
        .tab-panel {
            display: none;
            margin-top: 12px;
        }
        .tab-panel.active {
            display: block;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
        }
        .card h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }
        .hint {
            margin: -4px 0 12px;
            font-size: 13px;
            color: var(--muted);
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 13px;
        }
        input, textarea, button {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }
        input, textarea {
            background: #ffffff;
            color: var(--text);
            margin-bottom: 10px;
        }
        input:focus, textarea:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.3);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            cursor: pointer;
            border: none;
            font-weight: 600;
            background: var(--primary);
            color: #ffffff;
            transition: background 0.15s ease;
        }
        button:hover {
            background: var(--primary-hover);
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .status {
            margin-top: 10px;
            padding: 10px 12px;
            background: #f8fafc;
            border: 1px dashed #dbe3ef;
            border-radius: 10px;
            font-size: 13px;
            color: #374151;
            line-height: 1.5;
        }
        .answer {
            margin-top: 10px;
            background: #f8fafc;
            border: 1px solid #e3eaf7;
            border-radius: 10px;
            padding: 12px;
            min-height: 130px;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
        }
        .toast-wrap {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: min(360px, calc(100vw - 28px));
            pointer-events: none;
        }
        .toast {
            background: #ffffff;
            border: 1px solid var(--line);
            border-left: 4px solid #9ca3af;
            border-radius: 10px;
            padding: 10px 12px;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.1);
            color: #111827;
            font-size: 13px;
            line-height: 1.45;
            pointer-events: auto;
        }
        .toast.ok { border-left-color: var(--ok); }
        .toast.err { border-left-color: var(--err); }
        .toast.warn { border-left-color: var(--warn); }
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <section class="header">
        <h1 class="title">RAG 工作台</h1>
        <p class="sub">页面仅包含两个模块：离线上传与在线问答。系统会在后台自动完成用户与文件隔离（基于默认用户和文件摘要），无需手工处理。</p>
        <div class="top-row">
            <div class="base-url">
                <label>服务地址</label>
                <input id="baseUrl" value="http://localhost:8080"/>
            </div>
            <button style="max-width:180px;" onclick="checkHealth()">连接检测</button>
        </div>
    </section>

    <section class="tabbar">
        <button id="uploadTabBtn" class="tab-btn active" onclick="switchTab('upload')">离线上传</button>
        <button id="qaTabBtn" class="tab-btn" onclick="switchTab('qa')">在线问答</button>
    </section>

    <section id="uploadPanel" class="tab-panel active">
        <article class="card">
            <h2>离线上传</h2>
            <p class="hint">上传会自动走分片、断点状态记录、合并与消息触发。</p>
            <label>选择文件</label>
            <input id="fileInput" type="file" accept=".txt,.md,.json,.html,.csv,.pdf,.doc,.docx"/>
            <label>分片大小（字节）</label>
            <input id="chunkSize" type="number" value="128"/>
            <div class="row">
                <button onclick="initUpload()">初始化任务</button>
                <button onclick="uploadChunks()">上传分片</button>
            </div>
            <button style="margin-top:8px;" onclick="checkChunkStatus()">查询分片状态</button>
            <div class="status" id="uploadStatus">尚未选择文件。</div>
        </article>
    </section>

    <section id="qaPanel" class="tab-panel">
        <article class="card">
            <h2>在线问答</h2>
            <p class="hint">仅对当前已上传文件做作用域检索与回答。</p>
            <label>问题</label>
            <textarea id="query">RAG 为什么要结合 BM25 与向量检索？</textarea>
            <label>TopK</label>
            <input id="topK" type="number" value="3"/>
            <button onclick="ask()">开始问答</button>
            <div class="answer" id="answerBox">答案将显示在这里。</div>
        </article>
    </section>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
    const DEFAULT_USER = "root";
    const DEFAULT_PASSWORD = "123456";

    let selectedFile = null;
    let fileMd5 = "";
    let isolatedFileId = "";
    let totalChunks = 0;
    let uploadInited = false;

    function notify(message, type) {
        const wrap = document.getElementById("toastWrap");
        const toast = document.createElement("div");
        toast.className = "toast " + (type || "");
        toast.textContent = "[" + new Date().toLocaleTimeString() + "] " + message;
        wrap.appendChild(toast);
        setTimeout(function () {
            if (toast.parentNode) {
                toast.parentNode.removeChild(toast);
            }
        }, 3600);
    }

    function baseUrl() {
        return document.getElementById("baseUrl").value.trim().replace(/\/$/, "");
    }

    function switchTab(tab) {
        const uploadBtn = document.getElementById("uploadTabBtn");
        const qaBtn = document.getElementById("qaTabBtn");
        const uploadPanel = document.getElementById("uploadPanel");
        const qaPanel = document.getElementById("qaPanel");
        if (tab === "upload") {
            uploadBtn.classList.add("active");
            qaBtn.classList.remove("active");
            uploadPanel.classList.add("active");
            qaPanel.classList.remove("active");
        } else {
            qaBtn.classList.add("active");
            uploadBtn.classList.remove("active");
            qaPanel.classList.add("active");
            uploadPanel.classList.remove("active");
        }
    }

    function setUploadStatus(text) {
        document.getElementById("uploadStatus").textContent = text;
    }

    async function postJson(path, body) {
        const resp = await fetch(baseUrl() + path, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });
        const raw = await resp.text();
        let data = raw;
        try { data = JSON.parse(raw); } catch (_) {}
        if (!resp.ok) {
            throw new Error("HTTP " + resp.status + " " + JSON.stringify(data));
        }
        return data;
    }

    async function ensureAuth() {
        const result = await postJson("/api/auth/login", {
            userId: DEFAULT_USER,
            password: DEFAULT_PASSWORD
        });
        if (!result.ok) {
            throw new Error("默认账号认证失败，请检查 root/123456");
        }
    }

    async function checkHealth() {
        try {
            const resp = await fetch(baseUrl() + "/api/health");
            const data = await resp.json();
            notify("连接正常: " + JSON.stringify(data), "ok");
        } catch (e) {
            notify("连接失败: " + e.message, "err");
        }
    }

    async function prepareFileContext() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) {
            throw new Error("请先选择文件");
        }
        selectedFile = file;
        const chunkSize = Number(document.getElementById("chunkSize").value);
        totalChunks = Math.ceil(file.size / chunkSize);
        fileMd5 = await md5OfFile(file);
        isolatedFileId = DEFAULT_USER + ":" + fileMd5;
        return {chunkSize, fileName: file.name, fileSize: file.size};
    }

    async function initUpload() {
        try {
            await ensureAuth();
            const ctx = await prepareFileContext();
            await postJson("/api/upload/init", {fileId: isolatedFileId, totalChunks: totalChunks});
            uploadInited = true;
            setUploadStatus("任务已初始化：文件 " + ctx.fileName + "，大小 " + ctx.fileSize + " 字节，共 " + totalChunks + " 片。");
            notify("上传任务初始化成功", "ok");
        } catch (e) {
            notify("初始化失败: " + e.message, "err");
        }
    }

    async function uploadChunks() {
        try {
            await ensureAuth();
            if (!uploadInited) {
                await initUpload();
                if (!uploadInited) return;
            }
            const chunkSize = Number(document.getElementById("chunkSize").value);
            for (let i = 0; i < totalChunks; i++) {
                const start = i * chunkSize;
                const end = Math.min(start + chunkSize, selectedFile.size);
                const blob = selectedFile.slice(start, end);

                const form = new FormData();
                form.append("fileId", isolatedFileId);
                form.append("totalChunks", String(totalChunks));
                form.append("chunkIndex", String(i));
                form.append("file", blob, selectedFile.name + ".part" + i);

                const resp = await fetch(baseUrl() + "/api/upload/chunk", {method: "POST", body: form});
                if (!resp.ok) {
                    throw new Error("分片 " + i + " 上传失败");
                }
            }
            setUploadStatus("分片上传完成，系统将自动进入消息消费与解析入库流程。");
            notify("分片上传完成", "ok");
        } catch (e) {
            notify("上传失败: " + e.message, "err");
        }
    }

    async function checkChunkStatus() {
        try {
            if (!isolatedFileId) {
                throw new Error("请先初始化上传任务");
            }
            const resp = await fetch(baseUrl() + "/api/upload/status?fileId=" + encodeURIComponent(isolatedFileId) + "&chunkIndex=1");
            const data = await resp.json();
            notify("分片状态: " + JSON.stringify(data), "ok");
        } catch (e) {
            notify("状态查询失败: " + e.message, "warn");
        }
    }

    async function checkScopedReady() {
        const resp = await fetch(
            baseUrl() + "/api/qa/status-scoped?userId=" + encodeURIComponent(DEFAULT_USER)
            + "&password=" + encodeURIComponent(DEFAULT_PASSWORD)
            + "&fileMd5=" + encodeURIComponent(fileMd5)
        );
        const raw = await resp.text();
        let data = raw;
        try { data = JSON.parse(raw); } catch (_) {}
        if (!resp.ok) {
            throw new Error("状态检查失败: " + JSON.stringify(data));
        }
        return data;
    }

    async function ask() {
        try {
            await ensureAuth();
            if (!fileMd5) {
                throw new Error("请先完成文件上传");
            }
            let ready = false;
            for (let i = 0; i < 10; i++) {
                const status = await checkScopedReady();
                if (status.ready) {
                    ready = true;
                    break;
                }
                notify("知识入库中，请稍候...", "warn");
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            if (!ready) {
                throw new Error("文件已上传，但知识还未入库完成，请稍后再问");
            }
            const query = document.getElementById("query").value.trim();
            const topK = Number(document.getElementById("topK").value);
            const result = await postJson("/api/qa/ask-scoped", {
                userId: DEFAULT_USER,
                password: DEFAULT_PASSWORD,
                fileMd5: fileMd5,
                query: query,
                topK: topK
            });
            document.getElementById("answerBox").textContent = result.answer || "已完成问答，但无文本答案。";
            notify("问答完成", "ok");
        } catch (e) {
            notify("问答失败: " + e.message, "err");
        }
    }

    async function md5OfFile(file) {
        const buffer = await file.arrayBuffer();
        return md5(buffer);
    }

    function md5(arrayBuffer) {
        const hex_chr = "0123456789abcdef".split("");
        function rhex(n) {
            let s = "", j = 0;
            for (; j < 4; j++) s += hex_chr[(n >> (j * 8 + 4)) & 0x0F] + hex_chr[(n >> (j * 8)) & 0x0F];
            return s;
        }
        function cmn(q, a, b, x, s, t) {
            a = add32(add32(a, q), add32(x, t));
            return add32((a << s) | (a >>> (32 - s)), b);
        }
        function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
        function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }
        function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
        function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | (~d)), a, b, x, s, t); }
        function md5blk_array(a) {
            let md5blks = [], i;
            for (i = 0; i < 64; i += 4) {
                md5blks[i >> 2] = a[i] + (a[i + 1] << 8) + (a[i + 2] << 16) + (a[i + 3] << 24);
            }
            return md5blks;
        }
        function md51_array(a) {
            let n = a.byteLength, state = [1732584193, -271733879, -1732584194, 271733878], i, length, tail, tmp, lo, hi;
            for (i = 64; i <= n; i += 64) md5cycle(state, md5blk_array(new Uint8Array(a.slice(i - 64, i))));
            a = a.slice(i - 64);
            length = a.byteLength;
            tail = new Array(16).fill(0);
            for (i = 0; i < length; i++) tail[i >> 2] |= new Uint8Array(a)[i] << ((i % 4) << 3);
            tail[i >> 2] |= 0x80 << ((i % 4) << 3);
            if (i > 55) { md5cycle(state, tail); tail = new Array(16).fill(0); }
            tmp = n * 8;
            tmp = tmp.toString(16).match(/(.*?)(.{0,8})$/);
            lo = parseInt(tmp[2], 16);
            hi = parseInt(tmp[1], 16) || 0;
            tail[14] = lo;
            tail[15] = hi;
            md5cycle(state, tail);
            return state;
        }
        function md5cycle(x, k) {
            let a = x[0], b = x[1], c = x[2], d = x[3];
            a = ff(a, b, c, d, k[0], 7, -680876936); d = ff(d, a, b, c, k[1], 12, -389564586);
            c = ff(c, d, a, b, k[2], 17, 606105819); b = ff(b, c, d, a, k[3], 22, -1044525330);
            a = ff(a, b, c, d, k[4], 7, -176418897); d = ff(d, a, b, c, k[5], 12, 1200080426);
            c = ff(c, d, a, b, k[6], 17, -1473231341); b = ff(b, c, d, a, k[7], 22, -45705983);
            a = ff(a, b, c, d, k[8], 7, 1770035416); d = ff(d, a, b, c, k[9], 12, -1958414417);
            c = ff(c, d, a, b, k[10], 17, -42063); b = ff(b, c, d, a, k[11], 22, -1990404162);
            a = ff(a, b, c, d, k[12], 7, 1804603682); d = ff(d, a, b, c, k[13], 12, -40341101);
            c = ff(c, d, a, b, k[14], 17, -1502002290); b = ff(b, c, d, a, k[15], 22, 1236535329);
            a = gg(a, b, c, d, k[1], 5, -165796510); d = gg(d, a, b, c, k[6], 9, -1069501632);
            c = gg(c, d, a, b, k[11], 14, 643717713); b = gg(b, c, d, a, k[0], 20, -373897302);
            a = gg(a, b, c, d, k[5], 5, -701558691); d = gg(d, a, b, c, k[10], 9, 38016083);
            c = gg(c, d, a, b, k[15], 14, -660478335); b = gg(b, c, d, a, k[4], 20, -405537848);
            a = gg(a, b, c, d, k[9], 5, 568446438); d = gg(d, a, b, c, k[14], 9, -1019803690);
            c = gg(c, d, a, b, k[3], 14, -187363961); b = gg(b, c, d, a, k[8], 20, 1163531501);
            a = gg(a, b, c, d, k[13], 5, -1444681467); d = gg(d, a, b, c, k[2], 9, -51403784);
            c = gg(c, d, a, b, k[7], 14, 1735328473); b = gg(b, c, d, a, k[12], 20, -1926607734);
            a = hh(a, b, c, d, k[5], 4, -378558); d = hh(d, a, b, c, k[8], 11, -2022574463);
            c = hh(c, d, a, b, k[11], 16, 1839030562); b = hh(b, c, d, a, k[14], 23, -35309556);
            a = hh(a, b, c, d, k[1], 4, -1530992060); d = hh(d, a, b, c, k[4], 11, 1272893353);
            c = hh(c, d, a, b, k[7], 16, -155497632); b = hh(b, c, d, a, k[10], 23, -1094730640);
            a = hh(a, b, c, d, k[13], 4, 681279174); d = hh(d, a, b, c, k[0], 11, -358537222);
            c = hh(c, d, a, b, k[3], 16, -722521979); b = hh(b, c, d, a, k[6], 23, 76029189);
            a = hh(a, b, c, d, k[9], 4, -640364487); d = hh(d, a, b, c, k[12], 11, -421815835);
            c = hh(c, d, a, b, k[15], 16, 530742520); b = hh(b, c, d, a, k[2], 23, -995338651);
            a = ii(a, b, c, d, k[0], 6, -198630844); d = ii(d, a, b, c, k[7], 10, 1126891415);
            c = ii(c, d, a, b, k[14], 15, -1416354905); b = ii(b, c, d, a, k[5], 21, -57434055);
            a = ii(a, b, c, d, k[12], 6, 1700485571); d = ii(d, a, b, c, k[3], 10, -1894986606);
            c = ii(c, d, a, b, k[10], 15, -1051523); b = ii(b, c, d, a, k[1], 21, -2054922799);
            a = ii(a, b, c, d, k[8], 6, 1873313359); d = ii(d, a, b, c, k[15], 10, -30611744);
            c = ii(c, d, a, b, k[6], 15, -1560198380); b = ii(b, c, d, a, k[13], 21, 1309151649);
            a = ii(a, b, c, d, k[4], 6, -145523070); d = ii(d, a, b, c, k[11], 10, -1120210379);
            c = ii(c, d, a, b, k[2], 15, 718787259); b = ii(b, c, d, a, k[9], 21, -343485551);
            x[0] = add32(a, x[0]); x[1] = add32(b, x[1]); x[2] = add32(c, x[2]); x[3] = add32(d, x[3]);
        }
        function add32(a, b) { return (a + b) & 0xFFFFFFFF; }
        const hash = md51_array(arrayBuffer);
        return rhex(hash[0]) + rhex(hash[1]) + rhex(hash[2]) + rhex(hash[3]);
    }

    notify("页面已就绪，可先点击连接检测。", "ok");
</script>
</body>
</html>
