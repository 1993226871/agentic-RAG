services:
  redis:
    image: redis:7.2
    container_name: rag-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  elasticsearch:
    build:
      context: ./docker/elasticsearch-ik
      dockerfile: Dockerfile
    container_name: rag-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: rag-rmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: rag-rmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.3.1/conf/broker.conf --enable-proxy
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf
      - rmq-store:/home/rocketmq/store
      - rmq-logs:/home/rocketmq/logs
    ports:
      - "10911:10911"
      - "10909:10909"

volumes:
  redis-data:
  minio-data:
  es-data:
  rmq-store:
  rmq-logs:
